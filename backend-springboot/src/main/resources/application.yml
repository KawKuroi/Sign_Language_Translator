spring:
  application:
    name: sign-language-backend
  datasource:
    url: jdbc:h2:file:./data/signlangdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

jwt:
  secret: ${JWT_SECRET:mi-clave-secreta-local-de-al-menos-32-chars!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
