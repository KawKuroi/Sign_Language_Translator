version: '3.8'

services:
  backend:
    build: 
      context: ./backend-springboot
      dockerfile: Dockerfile
    container_name: sign_lang_backend
    depends_on:
      - ai-service
    environment:
      - AI_SERVICE_URL=http://ai-service:8000
    ports:
      - "8080:8080"
    networks:
      - app-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service-python
      dockerfile: Dockerfile
    container_name: sign_lang_ai
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: sign_lang_frontend
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8080
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
